	<style charset="utf-8" type="text/css" crossorigin="anonymous">
		:root { --accent: #00ffcc; --bg: #050505; }

<body id="top" class="relative" direction="ltr" lang="en-US" role="document" itemscope itemtype="https://schema.org/isFamilyFriendly">
	<div class="card" id="appInterface">
	    <div id="statusLabel"><span class="status-light"></span>READY</div>
	    <div class="timer" id="timer">90s</div>
	    <button id="toggleBtn">Start Treatment</button>
	    <p class="footer">STIMULUS: 100 HZ SINE WAVE<br>FRAMEWORK: NAGOYA UNIVERSITY PROTOCOL</p>
	</div>

	<script charset="utf-8" crossorigin="anonymous">
	;(function() {
		let osc, timerInt;
		let active = false;
		let time = 90;

		const btn = document.getElementById('toggleBtn');
		const display = document.getElementById('timer');
		const ui = document.getElementById('appInterface');

		async function initTreatment() {
			await Tone.start(); /*Required for browser interaction policies*/

			osc = new Tone.Oscillator({
			  frequency: 100,
			  type: 'sine',
			  volume: -6 /*Calibrated gain for safe but effective output*/
			}).toDestination();

			/*0.5s ramp to maintain scientific acoustic integrity*/
			osc.start().fadeIn = 0.5;

			active = true;
			btn.innerText = 'Stop Session';
			ui.classList.add('active');

			timerInt = setInterval(() => {
			  time--;
			  display.innerText = time + 's';
			  if ( time <= 0 ) {
			  	stopTreatment();
			  }
			}, 1000);
		}

		function stopTreatment() {
			if ( osc ) {
			    osc.stop().fadeOut = 0.5;
			    setTimeout(() => osc.dispose(), 600);
			}
			clearInterval(timerInt);
			active = false;
			time = 90;
			display.innerText = '90s';
			btn.innerText = 'Start Treatment';
			ui.classList.remove('active');
		}

		btn.onclick = () => active ? stopTreatment() : initTreatment();

		if ( 'serviceWorker' in navigator ) {
			navigator.serviceWorker.register('./sw.js');
		}
	})();
	</script>
