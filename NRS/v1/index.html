	<style charset="utf-8" type="text/css" crossorigin="anonymous">
	  :root { --primary: #007bff; --bg: #0a0a0a; --panel: #1a1a1a; }

	  .container { padding: 20px; max-width: 500px; margin: auto; background: var(--panel); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10; }

<body id="top" class="relative" direction="ltr" lang="en-US" role="document" itemscope itemtype="https://schema.org/isFamilyFriendly">
	<div id="v-layer" class="visualizer"></div>
	<div class="container">
	  <h1>NEURAL RESET SUITE</h1>
	  
	  <div class="control-group">
	      <label>TINNITUS CENTER FREQUENCY: <span id="freqVal">4000</span> Hz</label>
	      <input type="range" id="freq" min="200" max="12000" value="4000">
	  </div>

		<div class="control-group">
		    <label>THERAPY MODALITY</label>
		    <select id="mode">
		        <option value="notched">Notched White Noise</option>
		        <option value="cr">Acoustic CR Neuromodulation</option>
		        <option value="binaural">Binaural (Alpha Entrainment)</option>
		        <option value="high">High Frequency Masking</option>
		    </select>
		</div>

    <div class="grid">
        <button id="v-toggle" class="btn-visual">VISUAL: OFF</button>
        <select id="v-mode">
            <option value="10">Alpha (10Hz)</option>
            <option value="40">Gamma (40Hz)</option>
        </select>
    </div>

    <button id="main-btn" class="btn-start">ACTIVATE ENGINE</button>
    <p style="font-size: 0.6rem; color: #555; text-align: center; margin-top: 15px;">
        INTENDED FOR NEUROLOGICAL HABITUATION. CALIBRATE TO PERSONAL COMFORT.
    </p>
	</div>

	<script charset="utf-8" crossorigin="anonymous">
	;(function() {
	    let engineActive = false;
	    let visualActive = false;
	    let currentNodes = [];
	    let vInterval;

	    const freqInput = document.getElementById('freq');
	    const freqVal = document.getElementById('freqVal');
	    const mainBtn = document.getElementById('main-btn');
	    const vBtn = document.getElementById('v-toggle');
	    const vLayer = document.getElementById('v-layer');

	    freqInput.oninput = () => freqVal.innerText = freqInput.value;

	    async function startAudio() {
	        await Tone.start();
	        const f = parseFloat(freqInput.value);
	        const mode = document.getElementById('mode').value;

	        if ( mode === 'notched' ) {
	            const noise = new Tone.Noise("white").start();
	            const filter = new Tone.Filter({
	                type: "notch",
	                frequency: f,
	                Q: 10
	            }).toDestination();
	            noise.connect(filter);
	            currentNodes = [noise, filter];
	        } else if ( mode === 'cr' ) {
	            const tones = [0.9, 0.95, 1.05, 1.1].map(m => f * m);
	            const poly = new Tone.PolySynth(Tone.Oscillator).toDestination();
	            const seq = new Tone.Sequence((time, freq) => {
	                poly.triggerAttackRelease(freq, "0.1", time);
	            }, tones, "8n").start(0);
	            Tone.Transport.start();
	            currentNodes = [poly, seq];
	        } else if ( mode === 'binaural' ) {
	            const oscL = new Tone.Oscillator(f, "sine").connect(new Tone.Panner(-1).toDestination()).start();
	            const oscR = new Tone.Oscillator(f + 10, "sine").connect(new Tone.Panner(1).toDestination()).start();
	            currentNodes = [oscL, oscR];
	        } else if ( mode === 'high' ) {
	            const highOsc = new Tone.Oscillator(f > 10000 ? f : 10000, "sine").toDestination().start();
	            currentNodes = [highOsc];
	        }
	    }

	    function stopAudio() {
	        currentNodes.forEach(n => { if(n.stop) {n.stop();} if(n.dispose) {n.dispose();} });
	        Tone.Transport.stop();
	        currentNodes = [];
	    }

	    mainBtn.onclick = () => {
	        if ( !engineActive ) {
	            startAudio();
	            mainBtn.innerText = "DEACTIVATE";
	            mainBtn.style.background = "#ff4444";
	        } else {
	            stopAudio();
	            mainBtn.innerText = "ACTIVATE ENGINE";
	            mainBtn.style.background = "#007bff";
	        }
	        engineActive = !engineActive;
	    };

	    vBtn.onclick = () => {
	        if ( !visualActive ) {
	            const hz = parseInt(document.getElementById('v-mode').value);
	            const ms = 1000 / hz;
	            vLayer.style.opacity = "1";
	            let visible = true;
	            vInterval = setInterval(() => {
	                vLayer.style.background = visible ? "white" : "black";
	                visible = !visible;
	            }, ms / 2);
	            vBtn.innerText = "VISUAL: ON";
	            vBtn.classList.add('active-v');
	        } else {
	            clearInterval(vInterval);
	            vLayer.style.opacity = "0";
	            vBtn.innerText = "VISUAL: OFF";
	            vBtn.classList.remove('active-v');
	        }
	        visualActive = !visualActive;
	    };

	    if ( 'serviceWorker' in navigator ) {
	    	navigator.serviceWorker.register('./sw.js');
	    }
	})();
	</script>
